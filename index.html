<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Tikus - BPP Bola</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --bg-body: #121212; --bg-card: #1e1e1e; --bg-input: #2d2d2d;
      --text-main: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333;
      --primary: #81c784; --secondary: #66bb6a; --danger: #ef5350; --warning: #ffb74d;
    }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; color: var(--text-main); }
    .container { max-width: 850px; margin: auto; }
    
    /* Tombol Home */
   .btn-home {
  position: fixed;
  bottom: 25px;
  right: 20px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-size: 24px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  z-index: 9999;
  border: 2px solid white;
  transition: 0.2s;
}

.btn-home:active {
  transform: scale(0.9);
}


    .main-header { text-align: center; margin-bottom: 25px; padding-top: 40px; }
    .main-header h1 { color: var(--primary); margin: 0; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; }
    .main-header p { color: var(--text-muted); margin: 5px 0 0 0; font-size: 0.7rem; }
    .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    h2 { color: var(--primary); margin: 0 0 15px 0; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; }
    .grid-input { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
    .input-group { display: flex; flex-direction: column; }
    label { font-weight: 600; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
    select, input { padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; outline: none; background-color: var(--bg-input); color: var(--text-main); }
    .full-width { grid-column: 1 / -1; }
    button { background: var(--primary); color: #121212; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
    button:hover { background: var(--secondary); transform: translateY(-2px); }
    .info-box { background: #1a2e1c; padding: 18px; border-radius: 12px; margin-top: 20px; border-left: 6px solid var(--primary); }
    .status-badge { padding: 5px 12px; border-radius: 30px; color: #121212; font-weight: 800; font-size: 0.8rem; }
    .chart-container { position: relative; margin-top: 20px; height: 220px; width: 100%; }
    .footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 30px; padding: 20px 0; border-top: 1px dashed var(--border-color); }
  </style>
</head>
<body>
<a href="https://mamank757.github.io/petani/" class="btn-home" title="Kembali ke Home">🏠</a>
<body>

<div class="container">
<div class="card">
  <div class="main-header">
    <h1>Simulasi Populasi Tikus</h1>
    <p>Monitoring & Prediksi Ledakan Hama Tikus Sawah</p>
  </div>

  <div class="card">
    <h2><i class="fas fa-chart-line"></i> Simulasi</h2>
    <div class="grid-input">
      <div class="input-group full-width">
         <label>Pilih Kondisi Lahan (Skenario):</label>
        <select id="skenario" onchange="updateBySkenario()">
          <option value="alami">🔴 Tanpa Pengendalian (Risiko Ledakan Tinggi)</option>
          <option value="setelah_tanam">🟠 Pengendalian Setelah Tanam (Racun/Perangkap Rutin)</option>
          <option value="sebelum_olah">🟡 Pengendalian Sebelum Olah Lahan (Gropyokan/Umpan)</option>
          <option value="pht">🟢 Pengendalian Terpadu (PHT - Strategi Lengkap)</option>
        </select>
      </div>
      <div class="input-group">
        <label>Masukkan Luas Lahan (ha)</label>
        <input type="number" id="luas" placeholder="0.5" step="any">
      </div>
      <div class="input-group">
        <label>Laju Pertumbuhan Tikus (r)</label>
        <input type="number" id="r" step="0.1" value="0.9">
      </div>
      <div class="input-group">
        <label>Durasi (minggu)</label>
        <input type="number" id="t" value="16">
      </div>
      <div class="input-group">
        <label>Efikasi Pengendalian (%)</label>
        <input type="number" id="kill" value="5">
      </div>
    </div>
    <button onclick="jalankanSimulasi()"><i class="fas fa-play-circle"></i> Hitung Proyeksi</button>
    <div id="hasilSimulasi" class="info-box" style="display:none"></div>
    <div class="chart-container"><canvas id="ratChart"></canvas></div>
  </div>

  <div class="footer">© 2026 King Mamank • PPL BPP Bola - Kab. Wajo</div>
</div>

<script>
let myChart;
Chart.defaults.color = '#a0a0a0';
Chart.defaults.scale.grid.color = '#333333';

function updateBySkenario() {
  const s = document.getElementById('skenario').value;
  const r = document.getElementById('r'); const k = document.getElementById('kill');
  if(s=='alami'){ r.value=0.9; k.value=5; }
  else if(s=='sebelum_olah'){ r.value=0.75; k.value=35; }
  else if(s=='setelah_tanam'){ r.value=0.6; k.value=25; }
  else { r.value=0.3; k.value=60; }
}

function jalankanSimulasi() {
  const luas = parseFloat(document.getElementById('luas').value);
  const r = parseFloat(document.getElementById('r').value);
  const t = parseInt(document.getElementById('t').value);
  const kill = parseFloat(document.getElementById('kill').value) / 100;
  if (isNaN(luas) || luas <= 0) return alert("Masukkan luas lahan!");
  
  let k = luas * 500; let Nt = luas * 6;
  let dataPop = []; let labels = [];
  for (let i = 0; i <= t; i++) {
    labels.push("Mg-" + i); dataPop.push(Math.round(Nt));
    let n_kendali = Nt * (1 - kill);
    Nt = n_kendali + (r * n_kendali * (1 - (n_kendali / k))) + (0.5 * luas);
    if (Nt > k) Nt = k;
  }
  const box = document.getElementById('hasilSimulasi'); box.style.display = 'block';
  let akhir = dataPop[dataPop.length-1]; let s, w;
  if (akhir > 0.5 * k) { s = "BAHAYA"; w = "#ef5350"; }
  else if (akhir > 0.15 * k) { s = "WASPADA"; w = "#ffb74d"; }
  else { s = "AMAN"; w = "#81c784"; }
  box.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
    <span>Populasi Akhir: <b>${akhir}</b> ekor</span>
    <span class="status-badge" style="background:${w}">${s}</span>
  </div>`;
  if (myChart) myChart.destroy();
  myChart = new Chart(document.getElementById('ratChart'), {
    type: 'line', data: { labels, datasets: [{ label: 'Ekor', data: dataPop, borderColor: w, backgroundColor: w + '15', fill: true, tension: 0.4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}
</script>
</body>
</html>
