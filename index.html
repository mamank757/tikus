<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Tikus Digital - BPP Bola</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --primary: #2e7d32; 
      --secondary: #1b5e20;
      --danger: #d32f2f;
      --warning: #ffa000;
      --bg: #f4f7f6; 
      --white: #ffffff;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: var(--bg); 
      margin: 0; 
      padding: 15px; 
      color: #333;
    }

    .container { max-width: 850px; margin: auto; }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid #e0e6ed;
    }

    h2 { 
      color: var(--primary); 
      margin: 0 0 15px 0;
      display: flex; 
      align-items: center; 
      gap: 12px;
      font-size: 1.3rem;
    }

    .grid-input { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
      gap: 15px; 
      margin-bottom: 15px;
    }

    .input-group { display: flex; flex-direction: column; }
    
    label { 
      font-weight: 600; 
      font-size: 0.85rem; 
      color: #555;
      margin-bottom: 6px;
    }

    select, input { 
      padding: 12px; 
      border: 2px solid #edf2f7; 
      border-radius: 10px; 
      outline: none;
      font-size: 1rem;
      transition: all 0.3s;
    }

    select:focus, input:focus { border-color: var(--primary); background: #f9fff9; }

    /* Gaya untuk input saat error */
    .input-error { border-color: var(--danger) !important; background-color: #fff5f5 !important; }

    .full-width { grid-column: 1 / -1; }

    button { 
      background: var(--primary); 
      color: white; 
      padding: 15px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      width: 100%;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
      transition: all 0.3s;
    }

    button:hover { background: var(--secondary); transform: translateY(-2px); }

    .info-box { 
      background: #f0fdf4; 
      padding: 18px; 
      border-radius: 12px; 
      margin-top: 20px; 
      border-left: 6px solid var(--primary);
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 30px;
      color: white;
      font-weight: 800;
      font-size: 0.8rem;
    }

    .table-container { overflow-x: auto; margin-top: 15px; }
    
    table { border-collapse: collapse; width: 100%; min-width: 550px; }
    th { background: #f8fafc; color: #64748b; font-size: 0.7rem; padding: 12px; text-transform: uppercase; }
    td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

    .critical-row { background-color: #fff5f5 !important; color: #c53030; font-weight: 600; }
    
    .chart-container {
      position: relative;
      margin-top: 20px;
      height: 220px;
      width: 100%;
    }

    .footer { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2><i class="fas fa-chart-line"></i> Simulasi Populasi Tikus</h2>
    
    <div class="grid-input">
      <div class="input-group full-width">
        <label>Pilih Kondisi Lahan (Skenario):</label>
        <select id="skenario" onchange="updateBySkenario()">
          <option value="alami">🔴 Tanpa Pengendalian (Risiko Ledakan Tinggi)</option>
          <option value="setelah_tanam">🟠 Pengendalian Setelah Tanam (Racun/Perangkap Rutin)</option>
          <option value="sebelum_olah">🟡 Pengendalian Sebelum Olah Lahan (Gropyokan/Umpan)</option>
          <option value="pht">🟢 Pengendalian Terpadu (PHT - Strategi Lengkap)</option>
        </select>
      </div>

      <div class="input-group">
        <label>Masukkan Luas Lahan (ha)</label>
        <input type="number" id="luas" placeholder="Contoh: 0.5" min="0" step="any">
      </div>
      <div class="input-group">
        <label>Laju Pertumbuhan Tikus (r)</label>
        <input type="number" id="r" step="0.1" value="0.9">
      </div>
      <div class="input-group">
        <label>Durasi (minggu)</label>
        <input type="number" id="t" value="16" min="1">
      </div>
      <div class="input-group">
        <label>Efikasi Kendali (%)</label>
        <input type="number" id="kill" value="5">
      </div>
    </div>

    <button onclick="jalankanSimulasi()"><i class="fas fa-play-circle"></i> Hitung Proyeksi Hama</button>
    
    <div id="hasilSimulasi" class="info-box" style="display:none"></div>
    
    <div class="chart-container">
      <canvas id="ratChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h2><i class="fas fa-calendar-check"></i> Rencana Tindakan Lapangan</h2>
    <div class="input-group">
      <label>Tanggal Mulai Tanam:</label>
      <input type="date" id="tglTanam" onchange="generateKalender()">
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Minggu</th>
            <th>Estimasi Tanggal</th>
            <th>Tindakan Rekomendasi PPL</th>
          </tr>
        </thead>
        <tbody id="tabelKalender">
          <tr><td colspan="3" style="text-align:center; color:#aaa;">Pilih tanggal tanam untuk melihat jadwal</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">Digital Tool PPL - Kecamatan Bola, Kab. Wajo</div>
</div>

<script>
let myChart;

function updateBySkenario() {
  const skenario = document.getElementById('skenario').value;
  const rInput = document.getElementById('r');
  const killInput = document.getElementById('kill');

  switch (skenario) {
    case 'alami':
      rInput.value = 0.9;
      killInput.value = 5; 
      break;
    case 'sebelum_olah':
      rInput.value = 0.75;
      killInput.value = 35;
      break;
    case 'setelah_tanam':
      rInput.value = 0.6;
      killInput.value = 25;
      break;
    case 'pht':
      rInput.value = 0.3;
      killInput.value = 60;
      break;
  }
}

function jalankanSimulasi() {
  const luasInput = document.getElementById('luas');
  const luas = parseFloat(luasInput.value);
  const r = parseFloat(document.getElementById('r').value);
  const t = parseInt(document.getElementById('t').value);
  const kill = parseFloat(document.getElementById('kill').value) / 100;

  // Reset status error
  luasInput.classList.remove('input-error');

  // Validasi Luas Lahan (Peringatan jika 0, kosong, atau negatif)
  if (isNaN(luas) || luas <= 0) {
    luasInput.classList.add('input-error');
    luasInput.focus();
    return alert("⚠️ Peringatan: Luas lahan tidak boleh 0 atau kosong. Masukkan nilai luas lahan yang valid (misalnya: 0.5 atau 1).");
  }

  if (!r || !t) return alert("Mohon lengkapi data laju pertumbuhan dan durasi!");

  const nAwalPerHa = 6; 
  const nMaksPerHa = 500; 
  let k = luas * nMaksPerHa;
  let Nt = luas * nAwalPerHa;

  let dataPopulasi = [];
  let labels = [];

  for (let i = 0; i <= t; i++) {
    labels.push("Mg-" + i);
    dataPopulasi.push(Math.round(Nt));

    let populasi_setelah_kendali = Nt * (1 - kill);
    let pertumbuhan = r * populasi_setelah_kendali * (1 - (populasi_setelah_kendali / k));
    let imigrasi = 0.5 * luas; 

    Nt = populasi_setelah_kendali + pertumbuhan + imigrasi;

    if (Nt > k) Nt = k;
    if (Nt < 1) Nt = 1;
  }

  const box = document.getElementById('hasilSimulasi');
  box.style.display = 'block';
  let status, warna;
  const akhir = dataPopulasi[dataPopulasi.length - 1];

  if (akhir > 0.5 * k) { status = "BAHAYA"; warna = "#d32f2f"; }
  else if (akhir > 0.15 * k) { status = "WASPADA"; warna = "#ffa000"; }
  else { status = "AMAN"; warna = "#2e7d32"; }

  box.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
      <span>Populasi Akhir: <b>${akhir}</b> ekor</span>
      <span class="status-badge" style="background:${warna}">${status}</span>
    </div>`;

  if (myChart) myChart.destroy();
  const ctx = document.getElementById('ratChart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Ekor',
        data: dataPopulasi,
        borderColor: warna,
        backgroundColor: warna + '15',
        fill: true,
        tension: 0.4,
        borderWidth: 2,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { 
        y: { beginAtZero: true, suggestedMax: k + 10, ticks: { maxTicksLimit: 5 } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

function generateKalender() {
  const tgl = document.getElementById('tglTanam').value;
  if (!tgl) return;
  const tglObj = new Date(tgl);
  const listKegiatan = [
    "Gropyokan & Bongkar Lubang Aktif", "Sanitasi Pematang/Saluran Irigasi", "Olah Tanah & Penggenangan Sarang",
    "PENANAMAN SEREMPAK", "Pasang Trap Barrier System (TBS)", "Monitoring Jejak & Umpan Segar",
    "Fumigasi Sarang (Emposan)", "Sanitasi Gulma Rutin", "WASPADA: Fase Bunting Padi",
    "Pengendalian Intensif (Umpan Beracun)", "Puncak Kerawanan (Lindungi Malai)", "Monitoring Menjelang Panen",
    "PANEN & Bersihkan Sisa Jerami", "Gropyokan Pasca Panen", "Bongkar Habitat Sisa"
  ];

  const tbody = document.getElementById('tabelKalender');
  tbody.innerHTML = '';
  listKegiatan.forEach((teks, i) => {
    let d = new Date(tglObj);
    d.setDate(tglObj.getDate() + (i - 3) * 7);
    let row = tbody.insertRow();
    row.insertCell(0).innerHTML = `<b>Mg ${i + 1}</b>`;
    row.insertCell(1).innerText = d.toLocaleDateString('id-ID', {day:'2-digit', month:'long'});
    let cellKeg = row.insertCell(2);
    cellKeg.innerText = teks;
    if (i >= 8 && i <= 10) { 
      row.className = 'critical-row'; 
      cellKeg.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${teks}`; 
    }
  });
}
</script>
</body>
</html>
